components:
  - id: character.soldier
    name: 一般兵
    ruby: いっぱんへい
    type: character
    zone: field
    display:
      kind: 一般兵

    unitCondition:
      cards:
        count: 1
        rank: "2..10"
      face: up

    properties:
      characterType: soldier
      size: unit.cards[0].rankValue
      labels: [attack, defense]

    text:
      summary: 数字2〜10のカードは一般兵として扱う。

  - id: fog.up
    name: アップ
    type: fog
    zone: fog

    text:
      ability: 対象とした兵士のサイズは、このターンが終わるまでキーカードの数字分加算される。

    abilities:
      - sizeModifier:
          target: binding.target
          amount: binding.amount

  - id: fog.down
    name: ダウン
    type: fog
    zone: fog

    text:
      ability: 対象とした兵士のサイズは、このターンが終わるまでキーカードの数字分減算される。

    abilities:
      - sizeModifier:
          target: binding.target
          amount: binding.amount

  - id: character.bulwark
    name: 防壁
    ruby: ぼうへき
    type: character
    zone: field
    display:
      kind: 防壁

    unitCondition:
      cards:
        count: 1
        suit: ["heart", "diamond"]
        rank: "A..K"
      face: down

    properties:
      characterType: bulwark
      labels: [defense]

    text:
      summary: ♡A〜Kと♢A〜Kのカードは防壁として扱う。
