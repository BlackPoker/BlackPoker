actions:
  - id: action.block
    name: ブロック
    ruby: ぶろっく
    type: basic

    request:
      trigger: direct
      speed: normal
      timing: block

    triggerCondition:
      event: actionResolved
      condition:
        actionId: action.attack
        hasAttacker: true

    targets:
      - id: targetUnit
        type: unit
        condition:
          componentType: character
          relation: self

    text:
      effect: アタッカーをブロックするキャラクター（ブロッカー）を指定する。

    effect:
      - declareBlock:
          blocker: targetUnit
