frames:
  - name: エントリー16
    image: entry
    frameId: entry16
    format: lite
    deck: |-
      次のカードのみで構成された16枚のデッキを使う
      * ♠A, 2, 3, K
      * ♡4, 7, J, Q
      * ♢5, 8, 10, Q
      * ♣A, 6, 9, K
    start: |-
      #. デッキをシャッフルする。
      #. デッキをライフとし、配置図の場所に伏せておく。
      #. ライフの一番上のカード7枚引き手札とする。
      #. :numref:`common_gamestart_preset` に従ってプリセットする。
      #. :numref:`common_gamestart_first` に従って先攻プレイヤーを決定する。
      #. :numref:`common_gamestart_start` に従ってゲームを開始する。

  - name: パック
    image: pack
    frameId: pack
    deck: 40枚以上
    format: lite,std,pro,mast
    start: |-
      #. デッキをシャッフルする。
      #. デッキの上から14枚を取り除いてパックとし、配置図の場所に伏せておく。
      #. 残りのデッキをライフとし配置図の場所に伏せておく。
      #. ライフの一番上のカード7枚引き手札とする。
      #. :numref:`common_gamestart_preset` に従ってプリセットする。
      #. :numref:`common_gamestart_first` に従って先攻プレイヤーを決定する。
      #. :numref:`common_gamestart_start` に従ってゲームを開始する。

    actionList: |-
      * パック操作アクション

  - name: レアパック
    image: rarePack
    frameId: rarePack
    inherits: パック
    format: std,pro,mast
    deck: 40枚以上
    start: |-
      #. デッキからレアカード1枚を選び配置図の場所に伏せておく。
      #. デッキをシャッフルする。
      #. デッキの上から14枚を取り除いてパックとし、配置図の場所に伏せておく。
      #. 残りのデッキをライフとし配置図の場所に伏せておく。
      #. ライフの一番上のカード7枚引き手札とする。
      #. :numref:`common_gamestart_preset` に従ってプリセットする。
      #. :numref:`common_gamestart_first` に従って先攻プレイヤーを決定する。
      #. :numref:`common_gamestart_start` に従ってゲームを開始する。

    actionList: |-
      * パック操作アクション
      * レアカード操作アクション


  - name: ストラテジー
    image: rarePack
    frameId: strategy
    inherits: レアパック
    format: pro,mast
    deck: 40枚以上
    start: |-
      #. デッキから最初の手札に入れる3枚を選ぶ。(シナリオ手札)
      #. デッキからレアカード1枚を選び配置図の場所に伏せておく。
      #. デッキをシャッフルする。
      #. デッキの上から14枚を取り除いてパックとし、配置図の場所に伏せておく。
      #. 残りのデッキをライフとし配置図の場所に伏せておく。
      #. ライフの一番上のカードを4枚引いて手札を7枚とする。
      #. :numref:`common_gamestart_preset` に従ってプリセットする。
      #. :numref:`common_gamestart_first` に従って先攻プレイヤーを決定する。
      #. :numref:`common_gamestart_start` に従ってゲームを開始する。

    actionList: |-
      * パック操作アクション
      * レアカード操作アクション


  - name: エクストラ
    image: extra
    frameId: extra
    inherits: ストラテジー
    format: mast
    deck: 40枚以上
    start: |-
      #. デッキから2枚を切札として選び、2枚とも配置図の切札の場所に伏せておく。
      #. デッキから最初の手札に入れる3枚を選ぶ。(シナリオ手札)
      #. デッキからレアカード1枚を選び配置図の場所に伏せておく。
      #. 残りのデッキをシャッフルし、上から14枚を取り除いてパックとし、配置図の場所に伏せておく。
      #. 残りのデッキをライフとし配置図の場所に伏せておく。
      #. ライフの一番上のカードを4枚引いて手札を7枚とする。
      #. ライフの一番上のカードを防壁として場に出し、次のカードを兵士の場所に裏向きで出す。(プリセット)
      #. 対戦相手も手札を7枚用意でき、準備ができてから :numref:`common_gamestart_first` に従って先攻プレイヤーを決定する。
      #. 先攻プレイヤーは、プリセットで兵士の場所に裏向きで出したカードを表にし、切札の場所の2枚のうち1枚を表向きにする。
      #. 後攻プレイヤーも、プリセットで兵士の場所に裏向きで出したカードを表にし、切札の場所の2枚のうち1枚を表向きにする。      
      #. :numref:`common_gamestart_start` に従ってゲームを開始する。

    actionList: |-
      * パック操作アクション
      * レアカード操作アクション
      * 切札操作アクション
      * 切札関連のアクション


  - name: ドラフト
    image: extra
    frameId: draft
    inherits: エクストラ
    format: mast
    deck: 40枚以上
    start: |-
      #. デッキをシャッフルし、上から3枚ずつ取って6個のミニパック(裏向きの3枚)を作成する。
      #. 1つ目のミニパックを見て1枚を選択し裏向きに脇に置き、残りの2枚を裏向きに元の位置に戻す。
      #. 2つ目から6つ目のミニパックも同様に1枚を選択して脇に置き、残りを元の位置に戻す。(合計6枚のカードを脇に置く)
      #. 脇に置いた6枚のカードを、レアカード1枚、切札2枚、シナリオ手札(最初の手札に入れるカード)3枚に分ける。
      #. ミニパックの残りのカード12枚と残りのデッキを混ぜてシャッフルする。
      #. 分けた2枚を切札とし、2枚とも配置図の切札の場所に伏せておく。
      #. 分けた3枚をシナリオ手札(最初の手札に入れるカード)とする。
      #. 分けたレアカード1枚を配置図の場所に伏せておく。
      #. 残りのデッキの上から14枚を取り除いてパックとし、配置図の場所に伏せておく。
      #. 残りのデッキをライフとし配置図の場所に伏せておく。
      #. ライフの一番上のカードを4枚引いて手札を7枚とする。(シナリオ手札の3枚と合わせて手札は7枚になる)
      #. ライフの一番上のカードを防壁として場に出し、次のカードを兵士の場所に裏向きで出す。(プリセット)
      #. 対戦相手も手札を7枚用意でき、準備ができてから :numref:`common_gamestart_first` に従って先攻プレイヤーを決定する。
      #. 先攻プレイヤーは、プリセットで兵士の場所に裏向きで出したカードを表にし、切札の場所の2枚のうち1枚を表向きにする。
      #. 後攻プレイヤーも、プリセットで兵士の場所に裏向きで出したカードを表にし、切札の場所の2枚のうち1枚を表向きにする。
      #. :numref:`common_gamestart_start` に従ってゲームを開始する。

    actionList: |-
      * パック操作アクション
      * レアカード操作アクション
      * 切札操作アクション
      * 切札関連のアクション


